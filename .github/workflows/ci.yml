name: CI

# Test + dependency/vulnerability scan on every push and PR (production.md §4).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt fastapi "uvicorn[standard]"
          python -m spacy download en_core_web_sm

      - name: Run tests
        # The suite skips tests that need live Neo4j / Ollama / Tabby, so it runs
        # green in CI without those services (see tests/conftest.py).
        run: pytest -q

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          # Non-blocking for now (report only); flip to fail the build once the
          # baseline is clean. Generates an SBOM-style advisory report.
          pip-audit -r requirement.txt || true

  image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t mosdac-chat-api:ci .

      - name: Scan image for OS/library CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mosdac-chat-api:ci
          format: table
          exit-code: "0"     # report-only; set to "1" to block on HIGH/CRITICAL
          severity: HIGH,CRITICAL
