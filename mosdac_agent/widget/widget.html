<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOSDAC Assistant</title>
  <link rel="stylesheet" href="widget.css">
</head>
<body>
  <div id="chat">
    <header id="hdr">
      <span id="title">MOSDAC Assistant</span>
    </header>
    <div id="log" aria-live="polite"></div>
    <form id="f" autocomplete="off">
      <input id="msg" placeholder="Ask MOSDAC-Bot to place an order…" required>
      <button type="submit">Send</button>
    </form>
  </div>
  <script>
    window.MOSDAC_API = window.MOSDAC_API
      || (window.location.origin.replace(/\/$/, '') + "/mosdac");
  </script>
  <script src="widget.js"></script>
</body>
</html>
