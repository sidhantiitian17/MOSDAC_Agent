# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  MOSDAC GraphRAG — OFFLINE STACK                                             ║
# ║                                                                              ║
# ║  LLM:        Tabby ML runs as its OWN container, started separately.         ║
# ║  Embeddings: BAAI/bge-large-en-v1.5 (1024-dim), from ./models_cache.         ║
# ║  Graph:      Neo4j 5.18.0 with NEO4J_AUTH=none.                              ║
# ║                                                                              ║
# ║  Start:   docker compose up --build                                          ║
# ║                                                                              ║
# ║  Neo4j alternative (matches plan_offline.md verification) — run it           ║
# ║  standalone instead of via this compose file:                                ║
# ║    docker load -i neo4j_5.tar          # ISRO air-gapped only                ║
# ║    docker run -d --name mosdac_graph_home -p 7474:7474 -p 7687:7687 \         ║
# ║      -v D:\AI_agents\neo4j_data:/data -e NEO4J_AUTH=none neo4j:5.18.0         ║
# ║  If you do that, run chat_api on the host with uvicorn rather than compose.   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:

  # ── Neo4j Knowledge Graph ────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18.0
    container_name: mosdac_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # Auth disabled — any creds the client sends (NEO4J_USERNAME / NEO4J_PASSWORD
      # in .env) are ignored by the server.
      NEO4J_AUTH: none
      NEO4J_server_memory_heap_max__size: "2G"
    volumes:
      - ./neo4j_data:/data        # bind mount — graph survives container recreation
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── FastAPI Chat Gateway ─────────────────────────────────────────────────────
  chat_api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mosdac_chat_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env                      # all settings AND credentials come from .env
    environment:
      # Inside the compose network, reach Neo4j by its service name — overrides
      # the bolt://localhost:7687 value carried in .env.
      NEO4J_URI: bolt://neo4j:7687
      # chat_api runs in a container; Tabby ML runs elsewhere. The .env value
      # http://localhost:8080 is NOT reachable from inside the container, so
      # override it here. Default assumes Tabby on the Docker host; for ISRO,
      # set TABBY_BASE_URL_DOCKER in .env to Tabby's LAN address.
      TABBY_BASE_URL: ${TABBY_BASE_URL_DOCKER:-http://host.docker.internal:8080/v1}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets the container reach host Tabby
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./prompts:/app/prompts
      - ./models_cache:/app/models_cache:ro   # pre-downloaded BGE model (offline)
      - ${DOWNLOADS_DIR:-./downloads}:/app/downloads:ro
      - ${ATLASES_DIR:-./atlases_pdfs}:/app/atlases:ro
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_logs:
  # neo4j_data is a host bind mount (./neo4j_data) — not a named volume.
  # ollama_data and hf_cache removed — Tabby ML runs as a separate container.
