# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  MOSDAC GraphRAG — OFFLINE STACK                                             ║
# ║                                                                              ║
# ║  LLM:        Tabby ML runs as its OWN container, started separately.         ║
# ║  Embeddings: bge-large via Ollama HTTP (/api/embeddings on host port 11434). ║
# ║  Graph:      Neo4j 5.18.0 with NEO4J_AUTH=none.                              ║
# ║                                                                              ║
# ║  Start:   docker compose up --build                                          ║
# ║                                                                              ║
# ║  Neo4j alternative (matches plan_offline.md verification) — run it           ║
# ║  standalone instead of via this compose file:                                ║
# ║    docker load -i neo4j_5.tar          # ISRO air-gapped only                ║
# ║    docker run -d --name mosdac_graph_home -p 7474:7474 -p 7687:7687 \         ║
# ║      -v ./neo4j_data:/data -e NEO4J_AUTH=none neo4j:5.18.0                    ║
# ║  If you do that, run chat_api on the host with uvicorn rather than compose.   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:

  # ── Neo4j Knowledge Graph ────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18.0
    container_name: mosdac_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # Auth disabled — any creds the client sends (NEO4J_USERNAME / NEO4J_PASSWORD
      # in .env) are ignored by the server.
      NEO4J_AUTH: none
      NEO4J_server_memory_heap_max__size: "2G"
    volumes:
      - ./neo4j_data:/data        # bind mount — graph survives container recreation
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Redis (persistent, multi-replica session store) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mosdac_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── FastAPI Chat Gateway ─────────────────────────────────────────────────────
  chat_api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mosdac_chat_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env                      # all settings AND credentials come from .env
    environment:
      # Inside the compose network, reach Neo4j by its service name — overrides
      # the bolt://localhost:7687 value carried in .env.
      NEO4J_URI: bolt://neo4j:7687
      # chat_api runs in a container; Tabby ML and Ollama run on the host.
      # localhost inside the container means the container itself, so override
      # both services to use host.docker.internal (or a LAN address for ISRO).
      TABBY_BASE_URL: ${TABBY_BASE_URL_DOCKER:-http://host.docker.internal:8080/v1}
      # Fix Bug #2: OLLAMA_BASE_URL was missing — container localhost ≠ host port 11434.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL_DOCKER:-http://host.docker.internal:11434}
      # Persistent sessions (production.md P0-2): use Redis by service name so a
      # multi-worker/replica deploy never splits session state across workers.
      CHAT_API_SESSION_BACKEND: ${CHAT_API_SESSION_BACKEND:-redis}
      CHAT_API_REDIS_URL: ${CHAT_API_REDIS_URL:-redis://redis:6379/0}
      CHAT_API_REQUIRE_PERSISTENT_SESSIONS: ${CHAT_API_REQUIRE_PERSISTENT_SESSIONS:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets the container reach host Tabby
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./prompts:/app/prompts
      - ${DOWNLOADS_DIR:-./downloads}:/app/downloads:ro
      - ${ATLASES_DIR:-./atlases_pdfs}:/app/atlases:ro
    # Readiness-aware healthcheck (P0-4): the LB / orchestrator only routes traffic
    # once embedder + Chroma + Neo4j actually answer, not merely when the port opens.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/ready', timeout=5).status==200 else 1)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  neo4j_logs:
  redis_data:
  # neo4j_data is a host bind mount (./neo4j_data) — not a named volume.
  # ollama_data and hf_cache removed — Tabby ML runs as a separate container.
