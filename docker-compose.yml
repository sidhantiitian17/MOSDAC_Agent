version: "3.9"

services:

  # ── 1. Qwen LLM via Ollama ──────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: mosdac_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  # ── 2. Neo4j Knowledge Graph ────────────────────────────────────────────────
  neo4j:
    image: neo4j:2025.04.0-community
    container_name: mosdac_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_server_memory_heap_max__size: "2G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # ── 3. FastAPI Chat Gateway ─────────────────────────────────────────────────
  chat_api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mosdac_chat_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - ollama
      - neo4j
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./prompts:/app/prompts
      - ${DOWNLOADS_DIR}:/app/downloads:ro
      - ${ATLASES_DIR}:/app/atlases:ro

volumes:
  ollama_data:
  neo4j_data:
  neo4j_logs:
