# ===========================================================================
# nginx site config for the MOSDAC BOT widget + chat API.
#
# Responsibilities:
#   * serve the widget JS/CSS assets under /static/
#   * reverse-proxy /chatapi/ to the FastAPI backend (chat_api) on :8000
#   * forward the Keycloak access token (Authorization header) for SSO users
#   * stay SSE-friendly for /chatapi/chat/stream
#
# MULTI-SITE: to serve another Drupal site, copy this file and change only
#   - server_name
#   - the /static/ alias path
#   - (and add the site's origin to CHAT_API_ALLOWED_ORIGINS in the backend .env)
# No application code changes are required.
# ===========================================================================

upstream mosdac_chat_api {
    # The FastAPI container/host. In docker-compose use the service name.
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name my-drupal-site.ddev.site localhost;     # ← change per site

    # ---- Widget static assets (FastAPI does NOT serve these) --------------
    location /static/ {
        alias /srv/mosdac/static/;                       # ← path to repo's static/
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # ---- Chat API (proxy to FastAPI) -------------------------------------
    location /chatapi/ {
        # Trailing slash on proxy_pass strips the /chatapi prefix so the backend
        # sees /chat, /conversations, etc.
        proxy_pass http://mosdac_chat_api/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        # H1: X-Real-IP is OVERWRITTEN with the real socket peer ($remote_addr) on
        # every request, so a client cannot forge it. The backend keys per-IP rate
        # limiting on X-Real-IP first (then the right-most X-Forwarded-For hop).
        # You MUST set CHAT_API_TRUST_FORWARDED_FOR=true in the backend .env when
        # running behind this proxy — otherwise every client collapses into ONE
        # shared rate-limit bucket (the nginx IP).
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSO passthrough — the backend verifies the JWT against Keycloak's JWKS.
        proxy_set_header Authorization     $http_authorization;

        # Server-Sent Events (/chatapi/chat/stream): disable buffering so tokens
        # reach the browser as they are produced, and allow a long-lived response.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;

        # CORS is handled by the FastAPI CORSMiddleware (env-driven allow-list),
        # so we do NOT add Access-Control-* here to avoid duplicate headers.
    }

    # ---- Optional: pre-reject expired tokens at the edge ------------------
    # If you front the API with Keycloak's mod_auth_openidc / an auth service,
    # wire an internal auth_request here. The backend still verifies the JWT,
    # so this is defence-in-depth, not a requirement.
    #
    # location = /_authcheck {
    #     internal;
    #     proxy_pass http://keycloak-auth/validate;
    #     proxy_pass_request_body off;
    #     proxy_set_header Content-Length "";
    #     proxy_set_header Authorization $http_authorization;
    # }
}
